    <style>
        :root {
            --tg-blue: #24A1DE;
            --dark-bg: #0f172a;
            --accent: #00ff88; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 380px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            display: block;
        }

        /* Pulse effect for the logo */
        .logo-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        h1 { font-size: 26px; margin: 0 0 10px 0; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.4; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            display: block;
            background: linear-gradient(135deg, #24A1DE 0%, #1c81b3 100%);
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(36, 161, 222, 0.3);
            text-transform: uppercase;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(36, 161, 222, 0.5);
        }

        .btn:active { transform: scale(0.98); }

        .counter {
            margin-top: 25px;
            font-size: 13px;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
