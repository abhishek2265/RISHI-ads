    <style>
        :root {

        }

        body {
            margin: 0;
            padding: 0;
            background: var(--midnight);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            overflow-x: hidden;
        }

        .container {

            max-width: 420px;
            padding: 45px 25px;
            border-radius: 40px;
            border: 1px solid rgba(205, 127, 50, 0.25);
            text-align: center;
            backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        /* CIRCULAR LOGO STYLING */
        .logo-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            position: relative;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the phoenix is centered */
            border-radius: 50%; /* Makes it circular */
            border: 3px solid var(--bronze);
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.4);
        }

        .label-text {
            font-size: 0.7rem;
            color: var(--bronze);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Impact', sans-serif;
            font-size: 3.2rem;
            margin: 0;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffffff 40%, #cd7f32 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .sub-brand {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: -5px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .bio-text {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 40px;
        }

        .grid-tag {
            background: rgba(30, 58, 138, 0.2);
            border: 1px solid rgba(205, 127, 50, 0.15);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .cta-btn {
            display: block;
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: white;
            text-decoration: none;
            padding: 22px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            box-shadow: 0 15px 30px rgba(139, 69, 19, 0.5);
            transition: 0.3s;
        }

        .cta-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(205, 127, 50, 0.6);
        }

        .footer-sec {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .live-dot {
            height: 8px; width: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
